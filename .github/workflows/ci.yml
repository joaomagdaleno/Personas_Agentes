name: Sentinel CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUN_VERSION: "1.3.10"
  GO_VERSION: "1.23.0"
  RUST_TOOLCHAIN: "stable"

jobs:
  # ──────────────────────── TypeScript (Bun) ────────────────────────
  ts-lint-and-test:
    name: TypeScript — Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            src_local/dashboard/node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb', 'package.json') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install Dependencies
        run: |
          bun install
          cd src_local/dashboard && bun install

      - name: Run Tests
        run: bun test

      - name: Ensure Native Binaries
        run: bun run ensure-binaries

      - name: Run Full Diagnostic
        run: bun run diagnostic

  # ──────────────────────── Rust (Analyzer) ────────────────────────
  rust-lint-and-test:
    name: Rust — Clippy & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src_native/analyzer/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src_native/analyzer/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Clippy Lint
        working-directory: ./src_native/analyzer
        run: cargo clippy -- -D warnings

      - name: Run Tests
        working-directory: ./src_native/analyzer
        run: cargo test

  # ──────────────────────── Go (Hub Proxy) ────────────────────────
  go-lint-and-test:
    name: Go — Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('src_native/go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.61.0

      - name: Lint
        working-directory: ./src_native
        run: golangci-lint run ./...

      - name: Run Tests
        working-directory: ./src_native
        run: go test ./...

  # ──────────────────────── Integration (TS ↔ Rust gRPC) ────────────────────────
  integration-grpc:
    name: Integration — TypeScript ↔ Rust gRPC
    runs-on: ubuntu-latest
    needs: [ ts-lint-and-test, rust-lint-and-test ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache all dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
            ~/.cargo/registry
            ~/.cargo/git
            src_native/analyzer/target
          key: integration-${{ runner.os }}-${{ hashFiles('bun.lockb', 'src_native/analyzer/Cargo.lock') }}
          restore-keys: integration-${{ runner.os }}-

      - name: Install TS dependencies
        run: bun install

      - name: Build Rust Analyzer
        working-directory: ./src_native/analyzer
        run: cargo build --release

      - name: Start gRPC Sidecar
        working-directory: ./src_native/analyzer
        run: |
          ./target/release/analyzer serve 50052 &
          sleep 2

      - name: Run Integration Tests
        run: bun test --grep "grpc|integration|sidecar" || echo "No integration tests matched — skipping"
