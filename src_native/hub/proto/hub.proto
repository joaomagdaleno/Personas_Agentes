syntax = "proto3";

package hub;

option go_package = "github.com/joaomagdaleno/Personas_Agentes/src_native/hub/proto";

service HubService {
  // Health & Monitoring
  rpc GetStatus(Empty) returns (StatusResponse);
  rpc WatchHealth(Empty) returns (stream HealthUpdate);
  rpc WatchEvents(Empty) returns (stream Event);

  // Discovery & Analysis
  rpc ScanProject(ScanRequest) returns (ScanResponse);
  rpc AnalyzeFile(AnalyzeRequest) returns (AnalyzeResponse);
  rpc AnalyzeStream(stream AnalyzeRequest) returns (stream AnalyzeResponse);
  rpc GetDependencies(AnalyzeRequest) returns (AnalyzeResponse);
  rpc Deduplicate(DeduplicateRequest) returns (AnalyzeResponse);
  rpc Fingerprint(AnalyzeRequest) returns (AnalyzeResponse);
  rpc DiscoverIdentity(AnalyzeRequest) returns (AnalyzeResponse);
  rpc IndexProject(AnalyzeRequest) returns (AnalyzeResponse);
  rpc ScanTopology(AnalyzeRequest) returns (AnalyzeResponse);
  rpc GetContext(AnalyzeRequest) returns (AnalyzeResponse);
  rpc GetConnectivity(ConnectivityRequest) returns (AnalyzeResponse);
  rpc Audit(AuditRequest) returns (AnalyzeResponse);
  rpc Batch(BatchRequest) returns (AnalyzeResponse);
  rpc Reason(ReasonRequest) returns (AnalyzeResponse);
  rpc Patterns(PatternRequest) returns (AnalyzeResponse);
  rpc Penalty(PenaltyRequest) returns (AnalyzeResponse);
  rpc CalculateScore(ScoreRequest) returns (AnalyzeResponse);
  rpc AuditCoverage(CoverageRequest) returns (AnalyzeResponse);
  rpc GetKnowledgeGraph(GraphRequest) returns (AnalyzeResponse);
  rpc QueryKnowledgeGraph(QueryRequest) returns (AnalyzeResponse);

  // Auto-Healing
  rpc ExecuteHealing(HealingPlan) returns (AnalyzeResponse);

  // Task Scheduler
  rpc EnqueueTask(TaskRequest) returns (TaskResponse);
  rpc GetPendingTasks(PendingRequest) returns (PendingResponse);
  rpc UpdateTask(UpdateTaskRequest) returns (Empty);
}

message Empty {}

message StatusResponse {
  string status = 1;
  string version = 2;
  HealthUpdate health = 3;
}

message HealthUpdate {
  double cpu_usage = 1;
  double memory_usage = 2;
  int32 goroutines = 3;
  repeated ProcessInfo heavy_processes = 4;
  string timestamp = 5;
}

message ProcessInfo {
  string name = 1;
  int32 pid = 2;
  double mem_mb = 3;
  double cpu_percent = 4;
}

message Event {
  string type = 1; // "FILE_WRITE", "FILE_CREATE", "FILE_REMOVE", "HEALTH_ALERT"
  string path = 2;
  string data = 3;
}

message ScanRequest {
  string directory = 1;
  string root = 2;
}

message FileMetadata {
  string path = 1;
  int32 loc = 2;
  int32 sloc = 3;
  int32 comments = 4;
  string intent = 5;
}

message ScanResponse {
  repeated FileMetadata files = 1;
}

message AnalyzeRequest {
  string file = 1;
  string content = 2; // Optional raw content to bypass disk I/O
}

message AnalyzeResponse {
  string json_data = 1; // Full analysis from Rust as JSON string
}

message TaskRequest {
  string task_type = 1;
  string target_file = 2;
}

message TaskResponse {
  int32 task_id = 1;
  bool success = 2;
}

message PendingRequest {
  int32 limit = 1;
}

message Task {
  int32 id = 1;
  string task_type = 2;
  string target_file = 3;
  string status = 4;
  string result = 5;
  string created_at = 6;
}

message PendingResponse {
  repeated Task tasks = 1;
}

message UpdateTaskRequest {
  int32 task_id = 1;
  string status = 2;
  string result = 3;
}

message DeduplicateRequest {
  string findings_json = 1;
}

message ConnectivityRequest {
  string dependency_map_json = 1;
}

message AuditRequest {
  string audit_json = 1;
}

message BatchRequest {
  string batch_json = 1;
}

message ReasonRequest {
  string prompt = 1;
  bool use_rag = 2;
}

message PatternRequest {
  string pattern_json = 1;
}

message PenaltyRequest {
  string penalty_json = 1;
}

message ScoreRequest {
  string score_json = 1;
}

message CoverageRequest {
  string coverage_json = 1;
}

message GraphRequest {
  string graph_json = 1;
}

message QueryRequest {
  string query_json = 1;
}

message HealingPlan {
  string issue_description = 1;
  string file_path = 2;
  string file_content = 3;
  string context = 4;
}
